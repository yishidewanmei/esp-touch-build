name: Build ESPTouch V1 XCFramework From Official Source
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取乐鑫官方 EsptouchForIOS V1 源码
        run: git clone https://github.com/EspressifApp/EsptouchForIOS.git esp-src
      - name: 进入源码目录编译真机静态库
        working-directory: esp-src
        run: |
          xcodebuild archive \
            -scheme Esptouch \
            -sdk iphoneos \
            -archivePath build/iphoneos.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
      - name: 编译模拟器静态库
        working-directory: esp-src
        run: |
          xcodebuild archive \
            -scheme Esptouch \
            -sdk iphonesimulator \
            -archivePath build/iphonesim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
      - name: 合并成XCFramework
        working-directory: esp-src
        run: |
          xcodebuild -create-xcframework \
            -archive build/iphoneos.xcarchive -framework Esptouch.framework \
            -archive build/iphonesim.xcarchive -framework Esptouch.framework \
            -output ../output/Esptouch.xcframework
      - name: 上传产物下载包
        uses: actions/upload-artifact@v4
        with:
          name: EspTouch-V1-Official-xcframework
          path: output
