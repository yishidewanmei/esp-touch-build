name: Build EspTouch V1 XCFramework
on: workflow_dispatch
jobs:
  compile_ios_lib:
    runs-on: macos-latest
    steps:
      - name: 安装CocoaPods
        run: sudo gem install cocoapods
      - name: 创建工作目录
        run: mkdir esp_ios_build && cd esp_ios_build
      - name: pod try 自动拉取 EspTouch 5.3.2（自带完整Xcode工程）
        working-directory: esp_ios_build
        run: |
          pod try EspTouch@5.3.2 --no-open
          # 进入自动生成的工程目录
          cd EspTouch
          pod install
      - name: 复制编译好的 XCFramework
        run: |
          mkdir output
          cp -r esp_ios_build/EspTouch/Pods/EspTouch/EspTouch.xcframework output/
      - name: 打包产物供下载
        uses: actions/upload-artifact@v4
        with:
          name: EspTouch-V1-xcframework
          path: output
